name: CI Pipeline

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WANDB_MODE: offline
  ZETTA_USER: test
  ZETTA_PROJECT: test
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  #SETUPTOOLS_ENABLE_FEATURES: legacy-editable

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Get token from Github App
        uses: actions/create-github-app-token@v3
        id: app_token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}
          # owner is required, otherwise the creds will fail the checkout step
          owner: ${{ github.repository_owner }}

      - name: Checkout from GitHub
        uses: actions/checkout@v6
        with:
          lfs: 'false'
          submodules: true
          ssh-key: ${{ secrets.git_ssh_key }}
          token: ${{ steps.app_token.outputs.token }}
      - name: Checkout matching internal branch
        run: |
          # Try to checkout matching branch in internal, fallback to main
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Current branch: $BRANCH_NAME"

          cd zetta_utils/internal

          # Check if matching branch exists in internal
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
            echo "Found matching branch '$BRANCH_NAME' in internal, checking out"
            git fetch origin "$BRANCH_NAME"
            git checkout -B "$BRANCH_NAME" FETCH_HEAD
          else
            echo "No matching branch in internal, using main (already checked out)"
            # Already on main from submodule init, no action needed
          fi
        shell: bash
      - name: Get changed files
        id: changed-py-files
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c  # v46.0.5
        with:
          files: |
            **/*.py
            pyproject.toml
            requirements*.txt
      - name: Setup Conda
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          channels: conda-forge
          conda-remove-defaults: "true"
      - name: Setup Go
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: '1.18.4'
      - name: Install CUE
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: go install cuelang.org/go/cmd/cue@v0.6.0
      - name: Install libboost
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends libboost-dev
      - name: Free up disk space
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          df -h
        shell: bash -l {0}
      - name: Install zetta_utils with dependencies
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: |
          python install_zutils.py --mode=all --pcg --dockerfile --skip_apt
        shell: bash -l {0}
      - name: Run pytest
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: pytest ./tests/unit  # pyproject.toml defines the cov generation arguments
        shell: bash -l {0}
      - name: Send coverage report to codecov
        uses: codecov/codecov-action@v5
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        with:
          files: coverage.xml




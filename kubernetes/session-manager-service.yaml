# ClusterIP Service for the always-on session-manager. Consumers reach it at
# http://session-manager.sessions.svc.cluster.local/ from within the cluster.
apiVersion: v1
kind: Service
metadata:
  name: session-manager
  namespace: sessions
spec:
  selector:
    app: session-manager
  ports:
  - port: 80
    targetPort: 80

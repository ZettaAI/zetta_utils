name: Integration Tests

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  WANDB_MODE: offline
  #SETUPTOOLS_ENABLE_FEATURES: legacy-editable

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Get token from Github App
        uses: actions/create-github-app-token@v3
        id: app_token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}
          # owner is required, otherwise the creds will fail the checkout step
          owner: ${{ github.repository_owner }}
      - name: Checkout from GitHub
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: true
          ssh-key: ${{ secrets.git_ssh_key  }}
          token: ${{ steps.app_token.outputs.token }}
      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          channels: conda-forge
          conda-remove-defaults: "true"
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.18.4'
      - name: Install CUE
        run: go install cuelang.org/go/cmd/cue@v0.6.0
      - name: Install libboost
        run: sudo apt-get update -y && sudo apt-get install -y libboost-dev
      - name: Free up disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          df -h
      - name: Install Python dependencies
        run: |
          python install_zutils.py --mode=all --pcg --dockerfile --skip_apt
        shell: bash -l {0}
      - name: Run pytest
        run: cd tests/integration && pytest --run-integration .
        shell: bash -l {0}
      - name: Send coverage report to codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml

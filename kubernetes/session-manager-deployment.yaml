# Always-on session-manager Deployment. Two replicas for availability; the
# manager is stateless across replicas (all state in Firestore). Mounts the
# session-templates ConfigMap at /etc/sessions so the manager can render the
# master Job and Service templates at session-create time.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-manager
  namespace: sessions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: session-manager
  template:
    metadata:
      labels:
        app: session-manager
    spec:
      serviceAccountName: session-manager-sa
      containers:
      - name: session-manager
        image: ${SESSIONS_IMAGE_TAG}
        command: ["zetta", "session-manager"]
        ports:
        - containerPort: 80
        env:
        - name: SESSION_MASTER_TEMPLATE_PATH
          value: /etc/sessions/session-master-template.yaml
        - name: SESSION_MASTER_SERVICE_TEMPLATE_PATH
          value: /etc/sessions/session-master-service.yaml
        - name: WORKLOAD_NAMESPACE
          value: sessions
        - name: SESSIONS_IMAGE_TAG
          value: ${SESSIONS_IMAGE_TAG}
        - name: OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: sessions-oauth
              key: client-id
        volumeMounts:
        - name: session-templates
          mountPath: /etc/sessions
      volumes:
      - name: session-templates
        configMap:
          name: session-templates

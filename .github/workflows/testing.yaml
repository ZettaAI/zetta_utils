        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends libboost-dev
      - name: Free up disk space
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af
          df -h
        shell: bash -l {0}
      - name: Install zetta_utils with dependencies
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: |
          python install_zutils.py --mode=all --pcg --dockerfile --skip_apt
        shell: bash -l {0}
      - name: Run pylint
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: pylint --recursive=y .
        shell: bash -l {0}
      - name: Run isort
        if: ${{ steps.changed-py-files.outputs.any_changed == 'true' }}
        run: isort --check-only --df --verbose --om --profile black --recursive .
        shell: bash -l {0}

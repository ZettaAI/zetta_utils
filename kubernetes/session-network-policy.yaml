# Restricts who can reach the cluster-internal session services. Auth is no
# longer enforced in-app, so this NetworkPolicy is the access boundary: only
# intra-namespace traffic (manager <-> master <-> worker) and the explicitly
# allowed API source may reach the sessions namespace.
#
# ACTION REQUIRED: uncomment and set the namespaceSelector/podSelector below to
# match the authenticated API that calls the session-manager. Until then, only
# in-namespace traffic is permitted and external callers are denied.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sessions-ingress
  namespace: sessions
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: sessions
    # - namespaceSelector:
    #     matchLabels:
    #       kubernetes.io/metadata.name: <API_NAMESPACE>
    #   podSelector:
    #     matchLabels:
    #       app: <API_APP_LABEL>
